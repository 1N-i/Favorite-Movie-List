<html>
  <head>
    <title>Favorite Movies</title>
    <link rel="stylesheet" href="style.css">
  </head>

  <body>
    <div class="container">
      <h1 class="page-title">My movies</h1>
      <p class="page-subtitle">What's your favorite movie?</p>
      <div class="form-wrapper">
        <input type="text" id="film" name="film" placeholder="Insert image link">
        <button onClick="addMovie()">Add movie</button>
        <button onClick="printScreen()">Save list</button>
      </div>
    </div>
    <div id="moviesList"></div>

    <script src="script.js"></script>
  </body>
</html>
